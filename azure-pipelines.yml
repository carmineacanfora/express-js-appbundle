# Uses dedicated JFrog ADO tasks wherever available.
#
# Stage flow:
#   EnvSetup → CurationAudit → ScanSourceCode ──→ Publish → ScanBuild
#                             → Docker ──────────↗

trigger: none

parameters:
  - name: rt_npm_remote_repo_id
    displayName: 'NPM Remote Repo'
    type: string
    default: 'carm-npmjs-remote'
  - name: rt_generic_repo
    displayName: 'Generic Repo'
    type: string
    default: 'carm-generic-dev-local'
  - name: rt_helm_repo
    displayName: 'Helm Repo'
    type: string
    default: 'carm-helm-dev-local'
  - name: rt_docker_repo
    displayName: 'Docker Repo'
    type: string
    default: 'carm-docker-dev-local'
  - name: docker_image_name
    displayName: 'Docker Image Name'
    type: string
    default: 'ejs'
  - name: rt_build_name
    displayName: 'Build Name'
    type: string
    default: 'ado-ejs-demo'
  - name: xr_enable_scan
    displayName: 'Enable Xray Scan'
    type: boolean
    default: "false"
  - name: xr_override_fail_build
    displayName: 'Xray Override Fail Build'
    type: boolean
    default: "false"

variables:
  DOCKER_REPO: ${{ parameters.rt_docker_repo }}
  IMAGE_NAME: ${{ parameters.docker_image_name }}

stages:
  # =================================================================
  # Stage 1: Environment Setup
  #   Print Inputs → GIT Checkout → Setup Docker Buildx → Install Node
  # =================================================================
  - stage: EnvSetup
    displayName: 'Environment Setup'
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: SetupJob
        displayName: 'Setup Environment'
        steps:
          # --- Print Inputs ---
          - script: |
              echo "========================================="
              echo "Pipeline Configuration"
              echo "========================================="
              echo "Build Name:        ${{ parameters.rt_build_name }}"
              echo "Docker Repo:       ${{ parameters.rt_docker_repo }}"
              echo "Image Name:        ${{ parameters.docker_image_name }}"
              echo "NPM Remote Repo:   ${{ parameters.rt_npm_remote_repo_id }}"
              echo "Xray Scan Enabled: ${{ parameters.xr_enable_scan }}"
              echo "Xray Fail Build:   ${{ parameters.xr_override_fail_build }}"
              echo "Generic Repo:      ${{ parameters.rt_generic_repo }}"
              echo "Helm Repo:         ${{ parameters.rt_helm_repo }}"
            displayName: 'Print Inputs'

          # --- GIT Checkout ---
          - checkout: self
            displayName: 'GIT Checkout'

          # --- Setup Docker Buildx ---
          - script: |
              docker buildx create --use --name mybuilder
              docker buildx inspect --bootstrap
            displayName: 'Setup Docker Buildx'

          # --- Install Node ---
          - task: UseNode@1
            inputs:
              version: '18.x'
            displayName: 'Install Node 18'

          # --- Verify ---
          - script: |
              echo "Node:   $(node --version)"
              echo "NPM:    $(npm --version)"
              echo "Docker: $(docker --version)"
              echo "Buildx: $(docker buildx version)"
            displayName: 'Verify Tools'

  # =================================================================
  # Stage 2: Curation Audit
  #   NPM Install → Curation Audit (on failure)
  # =================================================================
  - stage: CurationAudit
    displayName: 'Curation Audit'
    dependsOn: EnvSetup
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: CurationJob
        displayName: 'NPM Install & Curation Audit'
        steps:
          - checkout: self

          - task: UseNode@1
            inputs:
              version: '18.x'
            displayName: 'Install Node 18'

          # --- NPM Install ---
          - task: JFrogNpm@1
            name: npmInstall
            continueOnError: true
            inputs:
              command: 'install'
              artifactoryConnection: 'JFrog RT - solengeu'
              sourceRepo: '${{ parameters.rt_npm_remote_repo_id }}'
              arguments: '--loglevel=notice'
              collectBuildInfo: true
              threads: 10
              buildName: '${{ parameters.rt_build_name }}'
              buildNumber: '$(Build.BuildId)'
            displayName: 'NPM Install'

          # --- Curation Audit (on failure) ---
          - task: JFrogCliV2@1
            condition: not(eq(variables['Agent.JobStatus'], 'Succeeded'))
            inputs:
              jfrogPlatformConnection: 'JFrog CLI - solengeu'
              command: |
                jf npmc --repo-resolve ${{ parameters.rt_npm_remote_repo_id }}
                jf curation-audit --threads=10
            displayName: 'Curation Audit (on NPM failure)'

          - script: |
              echo "##[error]NPM Install failed. See Curation Audit results above."
              exit 1
            condition: not(eq(variables['Agent.JobStatus'], 'Succeeded'))
            displayName: 'Fail pipeline after Curation Audit'

  # =================================================================
  # Stage 3: Scan Source Code  (parallel with Docker)
  #   NPM Install (for audit) → Xray Audit
  # =================================================================
  - stage: ScanSourceCode
    displayName: 'Scan Source Code'
    dependsOn: CurationAudit
    condition: and(succeeded(), eq('${{ parameters.xr_enable_scan }}', 'True'))
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: AuditJob
        displayName: 'Xray Audit - NPM'
        steps:
          - checkout: self

          - task: UseNode@1
            inputs:
              version: '18.x'
            displayName: 'Install Node 18'

          # --- NPM Install (for audit) ---
          - task: JFrogNpm@1
            inputs:
              command: 'install'
              artifactoryConnection: 'JFrog RT - solengeu'
              sourceRepo: '${{ parameters.rt_npm_remote_repo_id }}'
              arguments: '--loglevel=error'
            displayName: 'NPM Install (for audit)'

          # --- Xray Audit ---
          - task: JFrogAudit@1
            inputs:
              xrayConnection: 'JFrog XR - solengeu'
              allowFailBuild: ${{ parameters.xr_override_fail_build }}
            displayName: 'Xray Audit - NPM'

  # =================================================================
  # Stage 4: Build Docker Image  (parallel with Scan Source Code)
  #   Docker Login → Docker Build & Push → Add to Build Info
  # =================================================================
  - stage: Docker
    displayName: 'Build Docker Image'
    dependsOn: CurationAudit
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: DockerJob
        displayName: 'Build & Push Docker Image'
        steps:
          - checkout: self

          # --- Setup Docker Buildx ---
          - script: |
              docker buildx create --use --name mybuilder
              docker buildx inspect --bootstrap
            displayName: 'Setup Docker Buildx'

          # --- Docker Login ---
          - task: JFrogCliV2@1
            inputs:
              jfrogPlatformConnection: 'JFrog CLI - solengeu'
              command: 'jf docker login $(JF_URL)'
            displayName: 'Docker Authenticate'

          # --- Docker Build & Push ---
          - script: |
              IMAGE_FULL="$(JF_URL)/$(DOCKER_REPO)/$(IMAGE_NAME):$(Build.BuildId)"
              docker buildx build \
                --push \
                --tag "$IMAGE_FULL" \
                --provenance=false \
                --metadata-file buildx-metadata.json \
                .

              DIGEST=$(cat buildx-metadata.json | jq -r '.["containerimage.digest"]')

              if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
                echo "##[error]Failed to capture Docker image digest."
                exit 1
              fi

              echo "IMAGE_FULL=$IMAGE_FULL"
              echo "DIGEST=$DIGEST"
              echo "##vso[task.setvariable variable=DOCKER_DIGEST]$DIGEST"
              echo "##vso[task.setvariable variable=IMAGE_FULL]$IMAGE_FULL"

              echo "$IMAGE_FULL@$DIGEST" > metadata.json
            displayName: 'Docker Build and Push'

          # --- Add Docker Package to Build Info ---
          - task: JFrogCliV2@1
            inputs:
              jfrogPlatformConnection: 'JFrog CLI - solengeu'
              command: |
                jf rt build-docker-create $(DOCKER_REPO) --image-file metadata.json --build-name ${{ parameters.rt_build_name }} --build-number $(Build.BuildId) --project $(JF_PROJECT)
            displayName: 'Docker Add Package to Build Info'

  # =================================================================
  # Stage 5: Publish
  #   Upload Docker Build Info → Upload Release Note →
  #   Upload Helm Charts → Collect Env & Git → Publish Build Info
  # =================================================================
  - stage: Publish
    displayName: 'Publish'
    dependsOn:
      - ScanSourceCode
      - Docker
    condition: |
      and
      (
        in(dependencies.ScanSourceCode.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'),
        in(dependencies.Docker.result, 'Succeeded', 'SucceededWithIssues')
      )
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: PublishJob
        displayName: 'Publish Artifacts & Build Info'
        steps:
          - checkout: self

          # --- Upload Release Note ---
          - task: JFrogGenericArtifacts@1
            inputs:
              command: 'Upload'
              connection: 'JFrog RT - solengeu'
              specSource: 'taskConfiguration'
              fileSpec: |
                {
                  "files": [
                    {
                      "pattern": "rn/Release-Note-App-1.0.pdf",
                      "target": "${{ parameters.rt_generic_repo }}/",
                      "flat": "true"
                    }
                  ]
                }
              collectBuildInfo: true
              buildName: '${{ parameters.rt_build_name }}'
              buildNumber: '$(Build.BuildId)'
              module: 'release_note:$(Build.BuildId)'
              projectKey: '$(JF_PROJECT)'
            displayName: 'Upload Release Note'

          # --- Upload Helm Charts ---
          - task: JFrogGenericArtifacts@1
            inputs:
              command: 'Upload'
              connection: 'JFrog RT - solengeu'
              specSource: 'taskConfiguration'
              fileSpec: |
                {
                  "files": [
                    {
                      "pattern": "helm/*.tgz",
                      "target": "${{ parameters.rt_helm_repo }}/",
                      "flat": "true"
                    }
                  ]
                }
              collectBuildInfo: true
              buildName: '${{ parameters.rt_build_name }}'
              buildNumber: '$(Build.BuildId)'
              module: 'helm_charts:$(Build.BuildId)'
              projectKey: '$(JF_PROJECT)'
            displayName: 'Upload Helm Charts'

          # --- Collect Environment & Git Info ---
          - task: JFrogCliV2@1
            inputs:
              jfrogPlatformConnection: 'JFrog CLI - solengeu'
              command: |
                jf rt build-collect-env "${{ parameters.rt_build_name }}" "$(Build.BuildId)" --project $(JF_PROJECT)
                jf rt build-add-git "${{ parameters.rt_build_name }}" "$(Build.BuildId)" --project $(JF_PROJECT)
            displayName: 'Collect Build Environment & Git Info'

          # --- Publish Build Info ---
          - task: JFrogPublishBuildInfo@1
            inputs:
              artifactoryConnection: 'JFrog RT - solengeu'
              buildName: '${{ parameters.rt_build_name }}'
              buildNumber: '$(Build.BuildId)'
              projectKey: '$(JF_PROJECT)'
            displayName: 'Publish Build Info'

  # =================================================================
  # Stage 6: Scan Build
  #   Xray Build Scan on the published build info
  # =================================================================
  - stage: ScanBuild
    displayName: 'Scan Build'
    dependsOn: Publish
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: ScanJob
        displayName: 'Xray Build Scan'
        steps:
          # --- Xray Build Scan ---
          - task: JFrogBuildScan@1
            inputs:
              xrayConnection: 'JFrog XR - solengeu'
              buildName: '${{ parameters.rt_build_name }}'
              buildNumber: '$(Build.BuildId)'
              projectKey: '$(JF_PROJECT)'
              allowFailBuild: true
              vuln: true
            displayName: 'Xray Build Scan'